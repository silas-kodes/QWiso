# Nixpacks configuration for Railway deployment
# Builds frontend + backend, serves both from the Express server
# Using Baileys (no Chrome required)

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python3",
  "gcc",
  "gnumake",
  "pkg-config",
]

[variables]
NODE_VERSION = "20"

[phases.install]
cmds = [
  "cd backend && npm install --include=dev",
  "cd frontend && npm install --include=dev",
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "mkdir -p backend/dist/public",
  "cp -r frontend/dist/* backend/dist/public/",
  "cd backend && npm run build",
]

[start]
cmd = "cd backend && npm start"
